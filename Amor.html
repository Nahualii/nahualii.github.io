<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Pamela 🖤</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: url('fondo-dark-fantasy.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      padding: 30px;
      position: relative;
      z-index: 2;
    }

    #contador {
      font-size: 2em;
      margin: 20px 0;
      color: #ff4d6d;
    }

    .corazon {
      font-size: 5em;
      color: #ff4d6d;
      position: relative;
      z-index: 2;
    }

    #carta {
      width: 80%;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(255, 77, 109, 0.2);
      border-radius: 15px;
      font-size: 1.1em;
      color: #fff;
      text-align: left;
      line-height: 1.5;
      white-space: pre-line;
      min-height: 400px;
      position: relative;
      z-index: 2;
    }

    .corazon-cae {
      position: fixed;
      font-size: 1.5em;
      top: -50px;
      z-index: 1;
      pointer-events: none;
      animation-name: caer;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes caer {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Mensaje inicial pantalla completa */
    #inicio {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      cursor: pointer;
      font-size: 1.5em;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>
<body>

<script>
  // Bloqueo con contraseña
  const password = "PYN"; // Cambialo si querés otra contraseña
  let intento = prompt("Para ver esta página, ingresá la contraseña:");

  if (intento !== password) {
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50px;'>Acceso denegado 🖤</h1>";
  }
</script>

<header>
  <h1>🖤 Pamela & Nahuel 🖤</h1>
  <p>Han pasado</p>
  <div id="contador"></div>
  <div class="corazon">❤️</div>
</header>

<div id="carta"></div>

<!-- Mensaje inicial para tocar y que arranque la música -->
<div id="inicio">
  Tocá la pantalla para escuchar nuestra canción 🖤
</div>

<!-- Música de fondo -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
  // Contador de días desde 19 septiembre 2025
  const fechaInicio = new Date(2025, 8, 19); // 8 = septiembre
  const contador = document.getElementById("contador");

  function actualizarContador() {
    const hoy = new Date();
    const diferencia = hoy - fechaInicio;
    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    contador.textContent = `${dias} días juntos 🖤`;
  }

  actualizarContador();
  setInterval(actualizarContador, 1000 * 60 * 60);

  // Carta con efecto máquina de escribir
  const cartaTexto = `Hoy cumplís 20 años, y no puedo explicar con palabras lo feliz que me hace poder estar a tu lado en un día tan importante. Feliz cumpleaños, mi amor. Espero que este nuevo año de tu vida esté lleno de felicidad, de sueños cumplidos y de momentos hermosos, porque nadie merece ser feliz tanto como vos.

Quiero aprovechar este día para agradecerte por todo. Gracias por tu amor, por tu paciencia y, sobre todo, por tu presencia. Gracias por estar conmigo cuando más te necesito y también cuando simplemente quiero compartir un momento con la persona que amo. Nunca me dejaste solo, ni en mis peores días ni en los mejores, y eso es algo que voy a valorar toda mi vida.

Hay algo que siempre voy a recordar: el día que nos conocimos. Yo estaba esperándote en esa estatua del Prado, bajo la lluvia, durante media hora. Y si hoy me preguntaran si volvería a hacerlo, la respuesta sería sí, mil veces sí. Porque en el instante en que te vi entendí que había valido completamente la pena. Me fascinaste desde el primer momento. Me encantaste físicamente, no voy a mentir, pero lo que terminó enamorándome de verdad fue tu forma de hablarme, de expresarte, la seguridad con la que eras vos misma. Después descubrí todas las cosas que teníamos en común y sentí que había encontrado a alguien realmente especial.

También guardo en mi corazón esos tres meses que estuvimos juntos todos los días en mi casa. Fueron momentos que nunca voy a olvidar, porque me hicieron sentir lo que es tener un hogar en una persona.

Gracias por cada detalle que tenés conmigo. Tal vez para vos sean cosas pequeñas, pero para mí significan muchísimo. Cada palabra, cada abrazo, cada gesto de cariño me hace sentir amado de una forma que nunca imaginé.

En solo nueve meses cambiaste mi vida por completo. Hoy no solo sos mi novia, también sos mi prometida, y no hay decisión de la que esté más seguro que la de querer pasar mi vida con vos.

Sueño con nuestro futuro. Si algún día podemos formar una familia y tener un hijo o una hija, voy a ser el hombre más feliz del mundo. Y si la vida tiene otros planes para nosotros, sé que igual voy a ser inmensamente feliz mientras sea a tu lado. Viajando, disfrutando de la vida, nos vamos a dar nuestros gustos, vamos a adoptar un gatito o una gatita y vamos a construir un hogar lleno de amor, risas y tranquilidad.

Quiero que nunca dudes de algo: te voy a elegir una y otra vez. Sos la mujer que amo, la persona con la que quiero compartir mis alegrías, mis miedos, mis sueños y cada día que me quede por vivir.

Feliz cumpleaños, mi tiquitita. Gracias por existir, gracias por aparecer en mi vida y gracias por hacerme tan feliz.

Te amo con todo mi corazón, hoy, mañana y siempre.`;

  const cartaElemento = document.getElementById("carta");
  let i = 0;

  function escribirCarta() {
    if (i < cartaTexto.length) {
      cartaElemento.textContent += cartaTexto.charAt(i);
      i++;
      setTimeout(escribirCarta, 20);
    }
  }

  escribirCarta();

  // Crear corazones negros que caen
  function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon-cae");
    corazon.style.left = Math.random() * window.innerWidth + "px";
    corazon.style.fontSize = 10 + Math.random() * 20 + "px";
    corazon.style.animationDuration = 5 + Math.random() * 5 + "s";
    corazon.textContent = "❤️";
    corazon.style.color = "#000000"; // corazones negros
    document.body.appendChild(corazon);

    setTimeout(() => {
      corazon.remove();
    }, 10000);
  }

  setInterval(crearCorazon, 500);

  // Autoplay música al tocar la pantalla
  const inicio = document.getElementById('inicio');
  const musica = document.getElementById('musica');

  inicio.addEventListener('click', () => {
    musica.play();
    inicio.style.display = 'none'; // Oculta el mensaje inicial
  });
</script>

</body>
</html>
