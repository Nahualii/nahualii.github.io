<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Pamela 🖤</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: url('fondo-dark-fantasy.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      padding: 30px;
      position: relative;
      z-index: 2;
    }

    #contador {
      font-size: 2em;
      margin: 20px 0;
      color: #ff4d6d;
    }

    .corazon {
      font-size: 5em;
      color: #ff4d6d;
      position: relative;
      z-index: 2;
    }

    #carta {
      width: 80%;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(255, 77, 109, 0.2);
      border-radius: 15px;
      font-size: 1.1em;
      color: #fff;
      text-align: left;
      line-height: 1.5;
      white-space: pre-line;
      min-height: 400px;
      position: relative;
      z-index: 2;
    }

    .corazon-cae {
      position: fixed;
      font-size: 1.5em;
      top: -50px;
      z-index: 1;
      pointer-events: none;
      animation-name: caer;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes caer {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Mensaje inicial pantalla completa */
    #inicio {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      cursor: pointer;
      font-size: 1.5em;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>
<body>

<script>
  // Bloqueo con contraseña
  const password = "PYN"; // Cambialo si querés otra contraseña
  let intento = prompt("Para ver esta página, ingresá la contraseña:");

  if (intento !== password) {
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50px;'>Acceso denegado 🖤</h1>";
  }
</script>

<header>
  <h1>🖤 Pamela & Nahuel 🖤</h1>
  <p>Han pasado</p>
  <div id="contador"></div>
  <div class="corazon">❤️</div>
</header>

<div id="carta"></div>

<!-- Mensaje inicial para tocar y que arranque la música -->
<div id="inicio">
  Tocá la pantalla para escuchar nuestra canción 🖤
</div>

<!-- Música de fondo -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
  // Contador de días desde 19 septiembre 2025
  const fechaInicio = new Date(2025, 8, 19); // 8 = septiembre
  const contador = document.getElementById("contador");

  function actualizarContador() {
    const hoy = new Date();
    const diferencia = hoy - fechaInicio;
    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    contador.textContent = `${dias} días juntos 🖤`;
  }

  actualizarContador();
  setInterval(actualizarContador, 1000 * 60 * 60);

  // Carta con efecto máquina de escribir
  const cartaTexto = `Mi princesa… mi luz en esta oscuridad que llevo dentro,

Perdón por escribirte a esta hora… perdón por aparecer así, con el alma abierta y sin saber cómo acomodar todo lo que siento. Perdón si te molesto… pero necesitaba que supieras lo que pasa dentro de mí, porque ya no me alcanzan las bromas para esconderlo.

A veces hago chistes, me río, intento que todo parezca liviano… pero la verdad es que muchas veces lo hago porque si no, me desmorono frente a vos. Es mi forma torpe de no mostrarte el dolor que cargo, de no romperme en pedazos mientras estoy a tu lado.

Y aun así… lo único que realmente me hace feliz es verte feliz. Verte sonreír es como si todo en mí se calmara por un momento, como si ese caos que llevo adentro se quedara en silencio solo por vos.

Hace mucho tiempo siento que perdí mi luz… que me quedé en una especie de noche eterna. Pero cuando estoy con vos… cuando te tengo cerca… siento algo que no puedo explicar bien, como si esa luz perdida volviera a encenderse dentro mío. Me hacés sentir vivo… me hacés olvidar todo lo que me duele.

Y cuando te vas… ahí es cuando lo entiendo de verdad. Esa luz no era mía… eras vos. Siempre fuiste vos. Tu forma de ser, tu esencia, tu amor… todo en vos ilumina lo que en mí estaba apagado.

Ahora que no estás acá… me siento solo, perdido… y no puedo evitar llorar mientras te escribo esto. No puedo frenarlo. Me siento como un niño que necesita amor… y la única persona de la que realmente puedo aceptarlo, sos vos.

Perdón si esto te duele… perdón si te pesa leerlo. No quiero ser una carga para vos, de verdad que no. Solo… necesitaba que supieras cuánto te necesito, cuánto significa para mí tu amor, tu presencia, tu forma de estar en mi vida.

No te estoy pidiendo que cargues conmigo… te estoy diciendo que me encantaría ser amado por vos toda la vida, así como yo te elegí desde el primer día. Porque sí… desde que empezamos esto, amo el hecho de haberte elegido. Y sé, o quiero creer, que vos también me elegiste a mí.

Mi amor… mi princesa hermosa Pamela Geraldine Nievas López, sos la reina de mi vida. Sos todo para mí. Sos esa luz que brilla en mi oscuridad y que le da sentido a todo lo que soy.

Te amo… te amo en todos los idiomas, en todas las formas, incluso en las que todavía no sé demostrar. Te amo con algo que no sé explicar… algo que se siente más grande que yo mismo.

Te amo infinito… más infinito que el universo.

Tu caballero…
el que hoy escribe con los ojos llenos de lágrimas solo por vos. 🖤`;

  const cartaElemento = document.getElementById("carta");
  let i = 0;

  function escribirCarta() {
    if (i < cartaTexto.length) {
      cartaElemento.textContent += cartaTexto.charAt(i);
      i++;
      setTimeout(escribirCarta, 20);
    }
  }

  escribirCarta();

  // Crear corazones negros que caen
  function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon-cae");
    corazon.style.left = Math.random() * window.innerWidth + "px";
    corazon.style.fontSize = 10 + Math.random() * 20 + "px";
    corazon.style.animationDuration = 5 + Math.random() * 5 + "s";
    corazon.textContent = "❤️";
    corazon.style.color = "#000000"; // corazones negros
    document.body.appendChild(corazon);

    setTimeout(() => {
      corazon.remove();
    }, 10000);
  }

  setInterval(crearCorazon, 500);

  // Autoplay música al tocar la pantalla
  const inicio = document.getElementById('inicio');
  const musica = document.getElementById('musica');

  inicio.addEventListener('click', () => {
    musica.play();
    inicio.style.display = 'none'; // Oculta el mensaje inicial
  });
</script>

</body>
</html>
